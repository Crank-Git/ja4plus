name: Update fingerprint database

on:
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 6am UTC
  workflow_dispatch: {}   # Allow manual trigger

permissions:
  contents: write

jobs:
  update-db:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download latest mapping CSV
        run: |
          curl -fsSL "https://raw.githubusercontent.com/FoxIO-LLC/ja4/main/ja4plus-mapping.csv" \
            -o ja4plus/data/ja4plus-mapping.csv

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet ja4plus/data/ja4plus-mapping.csv; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to fingerprint database."
          else
            LINES=$(wc -l < ja4plus/data/ja4plus-mapping.csv)
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Database updated: $LINES entries."
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ja4plus/data/ja4plus-mapping.csv
          git commit -m "chore: update ja4plus-mapping.csv from FoxIO upstream"
          git push
